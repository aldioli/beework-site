backend:
  name: git-gateway
  branch: main

media_folder: "."
public_folder: "."

locale: ar

collections:
  - name: "pages"
    label: "الصفحات"
    files:
      - name: "index"
        label: "الصفحة الرئيسية"
        file: "index.html"
        fields:
          - { label: "المحتوى الكامل", name: "body", widget: "text" }
