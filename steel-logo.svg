<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="شعار الحديد">
  <defs>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f2f5f8"/>
      <stop offset="0.42" stop-color="#aab4bf"/>
      <stop offset="0.52" stop-color="#717c89"/>
      <stop offset="0.7" stop-color="#9aa6b2"/>
      <stop offset="1" stop-color="#cdd5de"/>
    </linearGradient>
    <linearGradient id="steelTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#b6c0cb"/>
    </linearGradient>
    <linearGradient id="goldg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FDE68A"/>
      <stop offset="0.5" stop-color="#F5C033"/>
      <stop offset="1" stop-color="#B8891A"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- شارة سداسية (ثيم خلية النحل) -->
  <polygon points="100,8 168,48 168,152 100,192 32,152 32,48"
           fill="#11131a" stroke="url(#goldg)" stroke-width="4"/>
  <polygon points="100,8 168,48 168,152 100,192 32,152 32,48"
           fill="none" stroke="#000" stroke-width="1" opacity="0.4"/>

  <!-- كمر حديدي I-beam بمنظور أيزومتري -->
  <g filter="url(#soft)">
    <!-- العمق العلوي (الفلنشة العليا) -->
    <polygon points="58,62 142,62 130,50 70,50" fill="url(#steelTop)"/>
    <!-- الفلنشة العليا - الوجه -->
    <rect x="58" y="62" width="84" height="14" fill="url(#steel)"/>
    <!-- الويب (الجذع) -->
    <rect x="90" y="76" width="20" height="48" fill="url(#steel)"/>
    <!-- خط لمعة على الجذع -->
    <rect x="93" y="76" width="3" height="48" fill="#ffffff" opacity="0.35"/>
    <!-- الفلنشة السفلى - الوجه -->
    <rect x="58" y="124" width="84" height="14" fill="url(#steel)"/>
    <!-- العمق السفلي -->
    <polygon points="58,138 142,138 130,150 70,150" fill="#5d6772"/>
    <!-- حواف ذهبية رفيعة -->
    <rect x="58" y="62" width="84" height="2" fill="url(#goldg)" opacity="0.85"/>
    <rect x="58" y="124" width="84" height="2" fill="url(#goldg)" opacity="0.85"/>
  </g>
</svg>
